<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa; color: #333; line-height: 1.6; padding: 2rem;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 2rem; text-align: center; padding-bottom: 0.5rem; border-bottom: 2px solid #eb2f96; }
        .mindmap { position: relative; padding: 2rem 0; }
        .mindmap-center {
            text-align: center; margin-bottom: 3rem;
        }
        .mindmap-center .center-node {
            display: inline-block; background: #eb2f96; color: #fff;
            padding: 1rem 2rem; border-radius: 12px; font-size: 1.3rem;
            font-weight: 700; box-shadow: 0 4px 12px rgba(235,47,150,0.3);
        }
        .mindmap-branches {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .branch {
            background: #fff; border-radius: 12px; padding: 1.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative;
            border-top: 3px solid #eb2f96;
        }
        .branch h3 {
            font-size: 1rem; color: #1a1a2e; margin-bottom: 0.75rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .branch h3::before {
            content: ''; display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: #eb2f96;
        }
        .branch .content { color: #555; white-space: pre-wrap; font-size: 0.9rem; }
        .branch .meta { margin-top: 0.75rem; font-size: 0.75rem; color: #999; }
        .tag {
            display: inline-block; background: #fff0f6; color: #eb2f96;
            padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem;
        }
        .connector {
            display: flex; justify-content: center; margin: 1rem 0;
        }
        .connector-line {
            width: 2px; height: 30px; background: #eb2f96; opacity: 0.3;
        }
        .footer { text-align: center; color: #ccc; font-size: 0.8rem; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ site_title }}</h1>
        {{ cards_html }}
        <div class="footer">由 关键卡片 生成</div>
    </div>
</body>
</html>
