<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa; color: #333; line-height: 1.6; padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 2rem; padding-bottom: 0.5rem; border-bottom: 2px solid #13c2c2; }
        .masonry {
            columns: 3; column-gap: 1.5rem;
        }
        @media (max-width: 900px) { .masonry { columns: 2; } }
        @media (max-width: 560px) { .masonry { columns: 1; } }
        .gallery-card {
            break-inside: avoid; background: #fff; border-radius: 8px;
            padding: 1.5rem; margin-bottom: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: inline-block; width: 100%;
        }
        .gallery-card h2 {
            font-size: 1.1rem; color: #1a1a2e; margin-bottom: 0.75rem;
            padding-bottom: 0.5rem; border-bottom: 1px solid #f0f0f0;
        }
        .gallery-card .content { color: #555; white-space: pre-wrap; font-size: 0.9rem; }
        .gallery-card .meta {
            margin-top: 1rem; font-size: 0.8rem; color: #999;
            display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
        }
        .tag {
            display: inline-block; background: #e6fffb; color: #13c2c2;
            padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem;
        }
        .footer { text-align: center; color: #ccc; font-size: 0.8rem; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ site_title }}</h1>
        <div class="masonry">
            {{ cards_html }}
        </div>
        <div class="footer">由 关键卡片 生成</div>
    </div>
</body>
</html>
