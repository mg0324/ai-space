<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa; color: #333; line-height: 1.8; padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 2rem; }
        .timeline {
            position: relative; padding-left: 2rem;
        }
        .timeline::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 2px; background: #4a6cf7;
        }
        .entry {
            position: relative; margin-bottom: 2rem; padding-left: 1.5rem;
        }
        .entry::before {
            content: ''; position: absolute; left: -2.1rem; top: 0.5rem;
            width: 12px; height: 12px; background: #4a6cf7;
            border-radius: 50%; border: 2px solid #fff;
        }
        .entry h2 { font-size: 1.1rem; color: #1a1a2e; margin-bottom: 0.5rem; }
        .entry .content { color: #555; white-space: pre-wrap; }
        .entry .meta { margin-top: 0.5rem; font-size: 0.8rem; color: #999; }
        .tag {
            display: inline-block; background: #eef2ff; color: #4a6cf7;
            padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem;
            margin-right: 0.25rem;
        }
        .footer { text-align: center; color: #ccc; font-size: 0.8rem; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ site_title }}</h1>
        <div class="timeline">
            {% for card in cards %}
            <div class="entry">
                <h2>{{ card.title }}</h2>
                <div class="content">{{ card.content }}</div>
                <div class="meta">
                    {% if card.tags %}
                    <div>
                        {% for tag in card.tags %}
                        <span class="tag">{{ tag }}</span>
                        {% endfor %}
                    </div>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
        <div class="footer">由 关键卡片 生成</div>
    </div>
</body>
</html>
