<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa; color: #333; line-height: 1.8; padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 2rem; padding-bottom: 0.5rem; border-bottom: 2px solid #4a6cf7; }
        .card {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
            padding: 1.5rem; margin-bottom: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .card h2 { font-size: 1.2rem; color: #1a1a2e; margin-bottom: 0.75rem; }
        .card .content { color: #444; white-space: pre-wrap; }
        .card .meta { margin-top: 1rem; font-size: 0.8rem; color: #999; }
        .tag {
            display: inline-block; background: #eef2ff; color: #4a6cf7;
            padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem;
            margin-right: 0.25rem;
        }
        .footer { text-align: center; color: #ccc; font-size: 0.8rem; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ site_title }}</h1>
        {% for card in cards %}
        <div class="card">
            <h2>{{ card.title }}</h2>
            <div class="content">{{ card.content }}</div>
            <div class="meta">
                {% if card.tags %}
                <div>标签：
                    {% for tag in card.tags %}
                    <span class="tag">{{ tag }}</span>
                    {% endfor %}
                </div>
                {% endif %}
                {% if card.source %}<div>来源：{{ card.source }}</div>{% endif %}
            </div>
        </div>
        {% endfor %}
        <div class="footer">由 关键卡片 生成</div>
    </div>
</body>
</html>
