{% extends "base.html" %}
{% block title %}生成网页{% endblock %}

{% block content %}
<h1>生成网页</h1>

<form id="generate-form" method="post">
<div class="generate-grid">
  <div>
    <hgroup>
      <h3>选择卡片</h3>
    </hgroup>
    <input type="text" id="card-filter" placeholder="过滤卡片…" style="margin-bottom:0.4rem">
    <div class="tag-filter">
      {% for tag in tags %}
      <label class="tag-checkbox">
        <input type="checkbox" class="tag-filter-cb" value="{{ tag }}">
        <span class="tag">{{ tag }}</span>
      </label>
      {% endfor %}
    </div>
    <div class="card-select-list">
      {% for card in cards %}
      <label class="card-checkbox" data-tags="{{ card.tag_list|map(attribute='name')|join(',') }}">
        <input type="checkbox" name="card_ids" value="{{ card.id }}" class="card-cb">
        <span>{{ card.title }}</span>
      </label>
      {% endfor %}
    </div>
  </div>

  <div>
    <hgroup>
      <h3>选择模板</h3>
    </hgroup>
    {% for t in templates %}
    <label class="template-radio-item">
      <input type="radio" name="template" value="{{ t.name }}" {% if loop.first %}checked{% endif %}>
      <div>
        <strong>{{ t.label }}</strong>
        <br><small style="color:var(--muted-color)">{{ t.description }}</small>
      </div>
    </label>
    {% endfor %}

    <div class="grid" style="margin-bottom:1rem">
      <button type="button" id="preview-btn">预览</button>
      <button type="button" id="export-btn" class="secondary">导出静态网页</button>
    </div>

    <div id="preview-area" style="display:none">
      <h3>预览</h3>
      <iframe id="preview-frame"></iframe>
    </div>
  </div>
</div>
</form>
{% endblock %}

{% block scripts %}
<script>
const previewBtn = document.getElementById('preview-btn');
const exportBtn = document.getElementById('export-btn');
const previewArea = document.getElementById('preview-area');
const previewFrame = document.getElementById('preview-frame');
const form = document.getElementById('generate-form');

function getSelectedIds() {
  return Array.from(document.querySelectorAll('.card-cb:checked')).map(cb => cb.value);
}

function getSelectedTemplate() {
  const radio = document.querySelector('input[name="template"]:checked');
  return radio ? radio.value : '';
}

previewBtn.addEventListener('click', async function() {
  const cardIds = getSelectedIds();
  const template = getSelectedTemplate();
  if (!cardIds.length || !template) {
    alert('请至少选择一张卡片和一个模板');
    return;
  }

  const formData = new FormData();
  cardIds.forEach(id => formData.append('card_ids', id));
  formData.append('template', template);

  const resp = await fetch('{{ url_for("generate.preview") }}', {
    method: 'POST',
    body: formData
  });
  const result = await resp.json();
  if (result.html) {
    previewArea.style.display = 'block';
    previewFrame.srcdoc = result.html;
  } else {
    alert(result.error || '生成失败');
  }
});

exportBtn.addEventListener('click', async function() {
  const cardIds = getSelectedIds();
  const template = getSelectedTemplate();
  if (!cardIds.length || !template) {
    alert('请至少选择一张卡片和一个模板');
    return;
  }

  const formData = new FormData();
  cardIds.forEach(id => formData.append('card_ids', id));
  formData.append('template', template);

  const resp = await fetch('{{ url_for("generate.export") }}', {
    method: 'POST',
    body: formData
  });
  const result = await resp.json();
  alert(result.message || result.error);
});

document.getElementById('card-filter').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.card-checkbox').forEach(el => {
    const title = el.querySelector('span').textContent.toLowerCase();
    el.style.display = title.includes(q) ? '' : 'none';
  });
});

document.querySelectorAll('.tag-filter-cb').forEach(cb => {
  cb.addEventListener('change', function() {
    const activeTags = Array.from(document.querySelectorAll('.tag-filter-cb:checked'))
      .map(c => c.value);
    document.querySelectorAll('.card-checkbox').forEach(el => {
      if (!activeTags.length) {
        el.style.display = '';
        return;
      }
      const cardTags = (el.dataset.tags || '').split(',');
      const match = activeTags.some(t => cardTags.includes(t));
      el.style.display = match ? '' : 'none';
    });
  });
});
</script>
{% endblock %}
