{% extends "base.html" %}
{% block title %}标签管理 - 关键卡片{% endblock %}

{% block content %}
<div class="page-header">
    <h1>标签管理</h1>
    <div class="header-actions">
        <button id="add-tag-btn" class="btn btn-primary">新建标签</button>
    </div>
</div>

<div class="tag-mgmt-grid">
    {% for item in tags %}
    <div class="tag-mgmt-item" data-tag-id="{{ item.tag.id }}">
        <div class="tag-mgmt-info">
            <span class="tag tag-lg">{{ item.tag.name }}</span>
            <span class="tag-count">{{ item.count }} 张卡片</span>
        </div>
        <div class="tag-mgmt-actions">
            <button class="btn btn-sm rename-btn" data-id="{{ item.tag.id }}" data-name="{{ item.tag.name }}">重命名</button>
            <form method="post" action="{{ url_for('tags.delete') }}" class="inline-form"
                  onsubmit="return confirm('确认删除标签「{{ item.tag.name }}」？将从所有卡片中移除。')">
                <input type="hidden" name="tag_id" value="{{ item.tag.id }}">
                <button type="submit" class="btn btn-sm btn-danger">删除</button>
            </form>
        </div>
    </div>
    {% else %}
    <div class="empty-state">
        <p>还没有标签。创建卡片时输入新标签会自动创建，或点击"新建标签"。</p>
    </div>
    {% endfor %}
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('add-tag-btn').addEventListener('click', function() {
    const name = prompt('输入标签名：');
    if (!name || !name.trim()) return;

    const formData = new FormData();
    formData.append('name', name.trim());

    fetch('{{ url_for("tags.create") }}', {
        method: 'POST',
        body: formData
    }).then(r => r.json()).then(result => {
        if (result.message) {
            location.reload();
        } else {
            alert(result.error || '创建失败');
        }
    });
});

document.querySelectorAll('.rename-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const id = this.dataset.id;
        const oldName = this.dataset.name;
        const newName = prompt('重命名标签：', oldName);
        if (!newName || !newName.trim() || newName.trim() === oldName) return;

        const formData = new FormData();
        formData.append('tag_id', id);
        formData.append('name', newName.trim());

        fetch('{{ url_for("tags.rename") }}', {
            method: 'POST',
            body: formData
        }).then(r => r.json()).then(result => {
            if (result.message) {
                location.reload();
            } else {
                alert(result.error || '重命名失败');
            }
        });
    });
});
</script>
{% endblock %}
