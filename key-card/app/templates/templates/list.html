{% extends "base.html" %}
{% block title %}模板管理{% endblock %}

{% block content %}
<h1>模板管理</h1>

<div class="grid">
  {% for t in templates %}
  <article>
    <header style="text-align:center">
      <div style="width:64px;height:64px;background:var(--primary);color:var(--primary-inverse);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin:0 auto">
        {{ t.label[:1] }}
      </div>
    </header>
    <h3 style="text-align:center">{{ t.label }}</h3>
    <p style="text-align:center;color:var(--muted-color);font-size:0.9rem">{{ t.description }}</p>
    <footer style="text-align:center">
      <code>{{ t.name }}</code>
    </footer>
  </article>
  {% else %}
  <article>
    <p>暂无可用模板。请在 <code>output_templates/</code> 目录下创建模板目录。</p>
  </article>
  {% endfor %}
</div>
{% endblock %}
