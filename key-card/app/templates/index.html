<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关键卡片</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/element-plus.css') }}">
  <style>
    body { margin: 0; font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }
    .page-container { padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .tag-badge { display: inline-block; background: #ecf5ff; color: #409eff; font-size: 12px; padding: 2px 8px; border-radius: 4px; margin: 2px 4px 2px 0; font-weight: 500; }
    .generate-layout { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }
    @media (max-width: 768px) { .generate-layout { grid-template-columns: 1fr; } }
    .card-select-list { border: 1px solid #dcdfe6; border-radius: 4px; max-height: 50vh; overflow-y: auto; }
    .card-select-item { display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #ebeef5; cursor: pointer; font-size: 14px; }
    .card-select-item:last-child { border-bottom: none; }
    .card-select-item:hover { background: #f5f7fa; }
    .preview-frame { width: 100%; height: 55vh; border: 1px solid #dcdfe6; border-radius: 4px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #909399; }
    .filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .logo-icon { width: 20px; height: 20px; vertical-align: middle; margin-right: 6px; }
    a { color: #409eff; text-decoration: none; }
    a:hover { color: #66b1ff; }
    .card-content { line-height: 1.8; white-space: pre-wrap; }
    .el-menu--horizontal > .el-menu-item { height: 50px; line-height: 50px; }
    .el-main { padding: 0 !important; }
  </style>
</head>
<body>
  <script>var STATIC_URL = "{{ url_for('static', filename='') }}";</script>

  {% raw %}
  <div id="app">
    <el-container direction="vertical" style="min-height:100vh">
      <div style="max-width:1200px;margin:0 auto;width:100%">
        <el-menu mode="horizontal" :default-active="currentRoute" router>
          <el-menu-item index="/cards">
            <img :src="STATIC_URL + 'logo.svg'" class="logo-icon" alt="">
            <strong>关键卡片</strong>
          </el-menu-item>
          <el-menu-item index="/cards">卡片管理</el-menu-item>
          <el-menu-item index="/tags">标签管理</el-menu-item>
          <el-menu-item index="/templates">模板管理</el-menu-item>
          <el-menu-item index="/generate">生成网页</el-menu-item>
        </el-menu>
      </div>
      <div class="page-container">
        <router-view></router-view>
      </div>
    </el-container>
  </div>

  <!-- ====== CardList 模板 ====== -->
  <script type="text/x-template" id="card-list-tpl">
    <div>
      <div class="page-header">
        <h2 style="margin:0">卡片管理</h2>
        <div>
          <el-button type="primary" @click="$router.push('/cards/new')">新建卡片</el-button>
          <el-button @click="handleImport">导入 JSON</el-button>
          <el-button @click="handleExport">导出 JSON</el-button>
        </div>
      </div>

      <div class="filter-bar">
        <el-input v-model="search" placeholder="搜索卡片…" clearable style="width:300px" @clear="load" @keyup.enter="load" />
        <el-select v-model="tagFilter" placeholder="全部标签" clearable @change="load" style="width:160px">
          <el-option v-for="t in tags" :key="t.id" :label="t.name" :value="t.name" />
        </el-select>
        <el-button @click="load">筛选</el-button>
      </div>

      <el-table :data="cards" v-loading="loading" stripe style="width:100%">
        <el-table-column prop="title" label="标题" min-width="200">
          <template #default="{ row }">
            <el-link type="primary" @click="viewCard(row.id)">{{ row.title }}</el-link>
          </template>
        </el-table-column>
        <el-table-column label="标签" width="200">
          <template #default="{ row }">
            <span v-for="t in (row.tags||[])" :key="t" class="tag-badge">{{ t }}</span>
          </template>
        </el-table-column>
        <el-table-column label="更新时间" width="150">
          <template #default="{ row }">{{ formatDate(row.updated_at) }}</template>
        </el-table-column>
        <el-table-column label="操作" width="150" fixed="right">
          <template #default="{ row }">
            <el-button size="small" @click="editCard(row.id)">编辑</el-button>
            <el-button size="small" type="danger" plain @click="removeCard(row.id, row.title)">删除</el-button>
          </template>
        </el-table-column>
      </el-table>
      <div v-if="!cards.length && !loading" class="empty-state">
        <p>还没有卡片，点击「新建卡片」开始吧。</p>
      </div>
    </div>
  </script>

  <!-- ====== CardForm 模板 ====== -->
  <script type="text/x-template" id="card-form-tpl">
    <div>
      <div class="page-header">
        <h2 style="margin:0">{{ isEdit ? '编辑卡片' : '新建卡片' }}</h2>
        <el-button @click="cancel">返回</el-button>
      </div>

      <el-card style="max-width:700px">
        <el-form label-position="top">
          <el-form-item label="标题" required>
            <el-input v-model="form.title" placeholder="输入标题" />
          </el-form-item>
          <el-form-item label="内容" required>
            <el-input v-model="form.content" type="textarea" :rows="10" placeholder="输入内容" />
          </el-form-item>
          <el-form-item label="标签">
            <el-checkbox-group v-model="form.tag_ids">
              <el-checkbox v-for="t in allTags" :key="t.id" :label="t.id" :value="t.id">
                <span class="tag-badge">{{ t.name }}</span>
              </el-checkbox>
            </el-checkbox-group>
            <div v-if="!allTags.length" style="color:#909399;font-size:13px">暂无标签，请在标签管理中创建。</div>
          </el-form-item>
          <el-form-item label="来源">
            <el-input v-model="form.source" placeholder="例如: 《书名》、视频链接" />
          </el-form-item>
          <el-form-item>
            <el-button type="primary" :loading="submitting" @click="submit">{{ isEdit ? '更新' : '创建' }}</el-button>
            <el-button @click="cancel">取消</el-button>
          </el-form-item>
        </el-form>
      </el-card>
    </div>
  </script>

  <!-- ====== CardDetail 模板 ====== -->
  <script type="text/x-template" id="card-detail-tpl">
    <div v-loading="loading">
      <div class="page-header" v-if="card">
        <h2 style="margin:0">{{ card.title }}</h2>
        <div>
          <el-button type="primary" @click="goEdit">编辑</el-button>
          <el-button @click="goBack">返回</el-button>
        </div>
      </div>

      <el-card v-if="card">
        <div v-if="card.tags && card.tags.length" style="margin-bottom:12px">
          <span v-for="t in card.tags" :key="t" class="tag-badge">{{ t }}</span>
        </div>
        <div style="color:#909399;font-size:13px;margin-bottom:12px">
          <template v-if="card.source">来源：{{ card.source }}<br></template>
          创建：{{ formatDate(card.created_at) }} ｜ 更新：{{ formatDate(card.updated_at) }}
        </div>
        <el-divider style="margin:8px 0" />
        <div class="card-content">{{ card.content }}</div>
      </el-card>
    </div>
  </script>

  <!-- ====== TagManager 模板 ====== -->
  <script type="text/x-template" id="tag-manager-tpl">
    <div>
      <div class="page-header">
        <h2 style="margin:0">标签管理</h2>
        <el-button type="primary" @click="addTag">新建标签</el-button>
      </div>

      <el-table :data="tags" v-loading="loading" stripe style="width:100%">
        <el-table-column prop="name" label="标签名" min-width="200" />
        <el-table-column prop="count" label="卡片数" width="100" />
        <el-table-column label="操作" width="200" fixed="right">
          <template #default="{ row }">
            <el-button size="small" @click="renameTag(row)">重命名</el-button>
            <el-button size="small" type="danger" plain @click="removeTag(row)">删除</el-button>
          </template>
        </el-table-column>
      </el-table>
      <div v-if="!tags.length && !loading" class="empty-state">
        <p>还没有标签。创建卡片时输入新标签会自动创建。</p>
      </div>
    </div>
  </script>

  <!-- ====== TemplateList 模板 ====== -->
  <script type="text/x-template" id="template-list-tpl">
    <div>
      <div class="page-header">
        <h2 style="margin:0">模板管理</h2>
      </div>

      <el-row :gutter="16" v-loading="loading">
        <el-col v-for="t in templates" :key="t.name" :xs="24" :sm="12" :md="8" style="margin-bottom:16px">
          <el-card>
            <div style="text-align:center">
              <div style="width:48px;height:48px;background:#409eff;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin:0 auto 12px">{{ t.label[0] }}</div>
              <h3 style="margin:0 0 8px">{{ t.label }}</h3>
              <p style="color:#909399;font-size:13px;margin:0 0 12px">{{ t.description }}</p>
              <el-tag size="small">{{ t.name }}</el-tag>
            </div>
          </el-card>
        </el-col>
        <div v-if="!templates.length && !loading" class="empty-state" style="width:100%">
          <p>暂无可用模板。</p>
        </div>
      </el-row>
    </div>
  </script>

  <!-- ====== GeneratePage 模板 ====== -->
  <script type="text/x-template" id="generate-page-tpl">
    <div>
      <h2 style="margin:0 0 16px">生成网页</h2>

      <div class="generate-layout" v-loading="loading">
        <el-card>
          <template #header><strong>选择卡片</strong></template>
          <el-input v-model="filterText" placeholder="过滤卡片…" style="margin-bottom:8px" clearable />
          <div style="margin-bottom:8px">
            <el-checkbox v-for="t in tags" :key="t" v-model="filterTags" :label="t" :value="t" style="margin-right:8px;margin-bottom:4px">
              <span class="tag-badge">{{ t }}</span>
            </el-checkbox>
          </div>
          <div class="card-select-list">
            <div v-for="card in filteredCards" :key="card.id" class="card-select-item" @click="handleCardCheck(card.id)">
              <el-checkbox :checked="isSelected(card.id)" style="margin-right:6px" />
              <span>{{ card.title }}</span>
            </div>
          </div>
        </el-card>

        <div>
          <el-card style="margin-bottom:16px">
            <template #header><strong>选择模板</strong></template>
            <el-radio-group v-model="selectedTemplate" style="display:flex;flex-direction:column;gap:6px;align-items:flex-start">
              <el-radio v-for="t in templates" :key="t.name" :label="t.name" :value="t.name" style="padding:8px 12px;border:1px solid #dcdfe6;border-radius:6px;margin-right:0;height:auto">
                <div>
                  <div style="font-weight:600">{{ t.label }}</div>
                  <div style="color:#909399;font-size:12px">{{ t.description }}</div>
                </div>
              </el-radio>
            </el-radio-group>
          </el-card>

          <div style="display:flex;gap:8px;margin-bottom:16px">
            <el-button type="primary" :loading="generating" @click="preview">预览</el-button>
            <el-button :loading="generating" @click="exportSite">导出静态网页</el-button>
          </div>

          <el-card v-if="showPreview">
            <template #header><strong>预览</strong></template>
            <iframe class="preview-frame" :srcdoc="previewHtml"></iframe>
          </el-card>
        </div>
      </div>
    </div>
  </script>
  {% endraw %}

  <script src="{{ url_for('static', filename='js/vue.global.prod.js') }}"></script>
  <script src="{{ url_for('static', filename='js/vue-router.global.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/axios.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/element-plus.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
